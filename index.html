<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Nireeksha!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,800;1,600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* Premium, deep dark radial background with tech neon undertones */
            background: radial-gradient(circle at 50% 50%, #1a1528 0%, #0d0a15 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Glows */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }
        body::before { background: #ff3366; top: 20%; left: 10%; }
        body::after { background: #00e676; bottom: 20%; right: 10%; }

        /* Modern Glassmorphism System Window Container */
        .window-container {
            background: rgba(25, 20, 35, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 204, 211, 0.15);
            border-radius: 24px;
            width: 92%;
            max-width: 400px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            position: relative;
            z-index: 10;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .window-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot.red { background: #ff5f56; box-shadow: 0 0 8px rgba(255, 95, 86, 0.4); }
        .dot.yellow { background: #ffbd2e; box-shadow: 0 0 8px rgba(255, 189, 46, 0.4); }
        .dot.green { background: #27c93f; box-shadow: 0 0 8px rgba(39, 201, 63, 0.4); }

        /* Clean Terminal Box */
        .terminal-box {
            background: rgba(10, 8, 15, 0.85);
            color: #5bf1b7;
            font-family: 'Fira Code', monospace;
            padding: 16px;
            border-radius: 12px;
            text-align: left;
            font-size: 13px;
            line-height: 1.6;
            min-height: 90px;
            margin-bottom: 24px;
            word-break: break-word;
            border: 1px solid rgba(91, 241, 183, 0.15);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
        }

        .window-title {
            font-size: 24px;
            color: #ffffff;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .window-subtitle {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 28px;
        }

        /* Buttons Styling */
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .btn-upgrade {
            background: linear-gradient(135deg, #00e676 0%, #00b0ff 100%);
            color: #051a0e;
            margin-bottom: 14px;
            box-shadow: 0 8px 25px rgba(0, 230, 118, 0.3);
        }
        .btn-upgrade:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 230, 118, 0.5);
        }

        .btn-stay {
            background: rgba(255, 51, 102, 0.15);
            color: #ff3366;
            border: 1px solid rgba(255, 51, 102, 0.3);
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.1);
            position: absolute;
            width: calc(100% - 48px);
            left: 24px;
        }
        .btn-stay:hover {
            background: rgba(255, 51, 102, 0.25);
        }

        /* Final Celebration Card Interface */
        .card-container {
            background: rgba(25, 20, 35, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            width: 92%;
            max-width: 400px;
            padding: 40px 24px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5),
                        inset 0 1px 1px rgba(255, 255, 255, 0.2);
            text-align: center;
            display: none;
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 10;
        }

        /* Polished Profile Frame */
        .img-frame {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 24px;
            padding: 4px;
            background: linear-gradient(135deg, #ff3366, #ff99cc, #00b0ff);
            box-shadow: 0 12px 35px rgba(255, 51, 102, 0.4);
            position: relative;
        }

        .img-frame::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            box-shadow: inset 0 0 12px rgba(255,255,255,0.6);
            pointer-events: none;
        }

        .img-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #191423;
        }

        .main-title {
            font-size: 20px;
            color: #ff99cc;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .name-banner {
            font-size: 36px;
            background: linear-gradient(135deg, #ffffff 30%, #ff99cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            margin-bottom: 14px;
            letter-spacing: -1px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(90deg, rgba(255,51,102,0.2), rgba(255,153,204,0.2));
            color: #ff99cc;
            border: 1px solid rgba(255, 51, 102, 0.3);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 30px;
            box-shadow: 0 4px 12px rgba(255, 51, 102, 0.15);
        }

        /* Lyrics Dynamic Box */
        .lyrics-box {
            font-size: 17px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            min-height: 52px;
            margin-bottom: 30px;
            padding: 0 10px;
            line-height: 1.5;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lyrics-highlight {
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 51, 102, 0.8), 0 0 30px rgba(255, 51, 102, 0.4);
            transform: scale(1.05);
            font-weight: 800;
        }

        .footer-status {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 20px;
        }

        /* Polished Confetti Elements */
        .confetti {
            position: absolute;
            width: 6px;
            height: 6px;
            top: -10px;
            z-index: 1;
            border-radius: 2px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(540deg);
            }
        }
    </style>
</head>
<body>

    <audio id="bg-music" preload="auto">
        <source src="Be_My_Baby-320258-mobiles24.mp3" type="audio/mpeg">
    </audio>

    <div class="window-container" id="setup-window">
        <div class="window-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
            <span>Nireeksha_OS - System Update</span>
        </div>
        <div class="terminal-box" id="terminal-text">
            > Initializing Nireeksha_OS kernel... Verifying age parameters... Update Recommended.
        </div>
        <h2 class="window-title">System v22.0 is expiring soon.</h2>
        <p class="window-subtitle">Upgrade to v23.0 now?</p>
        
        <button class="btn btn-upgrade" onclick="triggerUpgrade()">YES, UPGRADE</button>
        <button class="btn btn-stay" id="stay-btn" onmouseover="evadeButton()" onclick="evadeButton()">STAY 22</button>
        <div style="height: 55px;"></div> 
    </div>

    <div class="card-container" id="celebration-card">
        <div class="img-frame">
            <img src="nireeksha.jpg" alt="Nireeksha">
        </div>
        <h1 class="main-title">Happy 23rd Birthday</h1>
        <div class="name-banner">Nireeksha</div>
        <span class="badge">Level 23 Unlocked!</span>
        
        <div class="lyrics-box" id="lyrics-display">🎵 Music initializing...</div>
        
        <div class="footer-status">System Status: Optimization Complete ❤️</div>
    </div>

    <script>
        const stayBtn = document.getElementById('stay-btn');
        const terminal = document.getElementById('terminal-text');
        const audio = document.getElementById('bg-music');
        
        let prankStage = 0;
        const messages = [
            "> ERROR 403: Age progression is mandatory.",
            "> WARNING: Denial levels critical. Increasing cake requests.",
            "> LOG: Attempting to pause time... Access Denied.",
            "> System: Are you sure? Quarter-life crisis protocols will increase.",
            "> System: Confirming... Did you sign the waiver for adulting?"
        ];

        function evadeButton() {
            terminal.innerText = messages[prankStage];
            prankStage = (prankStage + 1) % messages.length;

            const container = document.getElementById('setup-window');
            const maxWidth = container.clientWidth - stayBtn.clientWidth - 20;
            const maxHeight = 260; 
            
            const randomX = Math.floor(Math.random() * maxWidth) + 10;
            const randomY = Math.floor(Math.random() * maxHeight) - 110; 

            stayBtn.style.left = randomX + 'px';
            stayBtn.style.top = randomY + 'px';
        }

        function triggerUpgrade() {
            document.getElementById('setup-window').style.display = 'none';
            const card = document.getElementById('celebration-card');
            card.style.display = 'block';
            
            setTimeout(() => {
                card.style.opacity = '1';
                card.style.transform = 'scale(1) translateY(0)';
            }, 50);

            audio.play().catch(error => {
                console.log("Audio autoplay prevented.");
            });
            
            setInterval(createConfetti, 120);
            startLyricEngine();
        }

        const lyricsTimeline = [
            { time: 0.0, text: "🎵 Upgrading Nireeksha_OS... 🎵" },
            { time: 1.6, text: "So won't you say you love me?" },
            { time: 5.0, text: "I'll make you so proud of me" },
            { time: 8.5, text: "We'll make 'em turn their heads every place we go" },
            { time: 13.0, text: "So won't you, please..." },
            { time: 15.5, text: "Be my, be my baby! 🎵", highlight: true },
            { time: 18.8, text: "Be my little baby! 💖", highlight: true },
            { time: 21.0, text: "Say you'll be my darlin'! 💕", highlight: true },
            { time: 24.2, text: "Be my baby now! 🎉", highlight: true },
            { time: 26.5, text: "Whoa-oh-oh-oh ✨" }
        ];

        function startLyricEngine() {
            const display = document.getElementById('lyrics-display');
            
            audio.addEventListener('timeupdate', () => {
                const currentTime = audio.currentTime;
                let activeLine = lyricsTimeline[0].text;
                let shouldHighlight = false;

                for (let i = 0; i < lyricsTimeline.length; i++) {
                    if (currentTime >= lyricsTimeline[i].time) {
                        activeLine = lyricsTimeline[i].text;
                        shouldHighlight = lyricsTimeline[i].highlight || false;
                    }
                }

                display.innerText = activeLine;
                if (shouldHighlight) {
                    display.classList.add('lyrics-highlight');
                } else {
                    display.classList.remove('lyrics-highlight');
                }
            });
        }

        const colors = ['#ff3366', '#ff99cc', '#ffbd2e', '#00e676', '#00b0ff'];
        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.width = Math.random() * 6 + 6 + 'px';
            confetti.style.height = (Math.random() * 10 + 6) + 'px'; // Varied shapes
            confetti.style.animationDuration = Math.random() * 1.5 + 2 + 's';
            
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 3500);
        }
    </script>
</body>
</html>

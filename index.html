<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Nireeksha!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #09070f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* High-Definition Moving Mesh Background */
        .bg-mesh {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            background: 
                radial-gradient(at 0% 0%, rgba(255, 51, 102, 0.18) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(0, 230, 118, 0.12) 0px, transparent 50%),
                radial-gradient(at 50% 100%, rgba(0, 176, 255, 0.15) 0px, transparent 50%);
            filter: blur(40px);
            animation: meshMove 20s ease infinite alternate;
        }

        @keyframes meshMove {
            0% { transform: scale(1); }
            100% { transform: scale(1.1) rotate(2deg); }
        }

        /* Hyper-Glassmorphism Container */
        .window-container {
            background: rgba(18, 14, 28, 0.75);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-top: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 28px;
            width: 92%;
            max-width: 410px;
            padding: 28px;
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.4),
                0 30px 70px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            position: relative;
            z-index: 10;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .window-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dot-wrapper {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .system-title-text {
            margin-left: auto;
        }

        /* HD Terminal Box */
        .terminal-box {
            background: #07050a;
            color: #00ffaa;
            font-family: 'JetBrains Mono', monospace;
            padding: 18px;
            border-radius: 16px;
            text-align: left;
            font-size: 12.5px;
            line-height: 1.6;
            min-height: 95px;
            margin-bottom: 28px;
            word-break: break-word;
            border: 1px solid rgba(0, 255, 170, 0.15);
            box-shadow: 
                inset 0 4px 20px rgba(0,0,0,0.8),
                0 0 20px rgba(0, 255, 170, 0.03);
        }

        .window-title {
            font-size: 26px;
            color: #ffffff;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .window-subtitle {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 32px;
        }

        /* Ultra-Clean UI Buttons */
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-upgrade {
            background: linear-gradient(135deg, #00ff88 0%, #00b0ff 100%);
            color: #030a06;
            margin-bottom: 16px;
            box-shadow: 0 8px 30px rgba(0, 255, 136, 0.3);
        }
        .btn-upgrade:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 255, 136, 0.5);
            filter: brightness(1.1);
        }

        .btn-stay {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: absolute;
            width: calc(100% - 56px);
            left: 28px;
        }
        .btn-stay:hover {
            background: rgba(255, 51, 102, 0.15);
            color: #ff3366;
            border-color: rgba(255, 51, 102, 0.3);
        }

        /* Final Celebration Card */
        .card-container {
            background: rgba(18, 14, 28, 0.75);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-top: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 36px;
            width: 92%;
            max-width: 410px;
            padding: 44px 28px;
            box-shadow: 
                0 35px 80px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            text-align: center;
            display: none;
            opacity: 0;
            transform: scale(0.92) translateY(30px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }

        /* High Clarity Avatar Frame */
        .img-frame {
            width: 156px;
            height: 156px;
            border-radius: 50%;
            margin: 0 auto 28px;
            padding: 4px;
            background: linear-gradient(135deg, #ff3366, #ff00aa, #00d4ff);
            box-shadow: 
                0 16px 40px rgba(255, 0, 170, 0.35),
                0 0 0 8px rgba(255, 255, 255, 0.02);
        }

        .img-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #100b1a;
        }

        .main-title {
            font-size: 14px;
            color: #ff00aa;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            margin-bottom: 6px;
            text-shadow: 0 0 10px rgba(255, 0, 170, 0.3);
        }

        .name-banner {
            font-size: 40px;
            background: linear-gradient(135deg, #ffffff 40%, #ff99cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(90deg, rgba(255,0,170,0.15), rgba(0,212,255,0.15));
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 12.5px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 34px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Clean High-Clarity Lyrics Box */
        .lyrics-box {
            font-size: 18px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.65);
            min-height: 56px;
            margin-bottom: 34px;
            padding: 0 8px;
            line-height: 1.5;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lyrics-highlight {
            color: #ffffff;
            text-shadow: 
                0 0 20px rgba(255, 0, 170, 0.8),
                0 0 40px rgba(0, 212, 255, 0.4);
            transform: scale(1.06);
            font-weight: 800;
        }

        .footer-status {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 24px;
        }

        /* High-Definition Confetti Streams */
        .confetti {
            position: absolute;
            width: 5px;
            height: 12px;
            top: -20px;
            z-index: 1;
            border-radius: 3px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(720deg);
            }
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>

    <audio id="bg-music" preload="auto">
        <source src="Be_My_Baby-320258-mobiles24.mp3" type="audio/mpeg">
    </audio>

    <div class="window-container" id="setup-window">
        <div class="window-header">
            <div class="dot-wrapper">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <span class="system-title-text">Nireeksha_OS - System Update</span>
        </div>
        <div class="terminal-box" id="terminal-text">
            > Initializing Nireeksha_OS kernel... Verifying age parameters... Update Recommended.
        </div>
        <h2 class="window-title">System v22.0 is expiring soon.</h2>
        <p class="window-subtitle">Upgrade to v23.0 now?</p>
        
        <button class="btn btn-upgrade" onclick="triggerUpgrade()">YES, UPGRADE NOW</button>
        <button class="btn btn-stay" id="stay-btn" onmouseover="evadeButton()" onclick="evadeButton()">STAY v22.0</button>
        <div style="height: 60px;"></div> 
    </div>

    <div class="card-container" id="celebration-card">
        <div class="img-frame">
            <img src="nireeksha.jpg" alt="Nireeksha">
        </div>
        <h1 class="main-title">Happy 23rd Birthday</h1>
        <div class="name-banner">Nireeksha</div>
        <span class="badge">🚀 Level 23 Unlocked</span>
        
        <div class="lyrics-box" id="lyrics-display">🎵 Music initializing...</div>
        
        <div class="footer-status">System Status: Optimization Complete ❤️</div>
    </div>

    <script>
        const stayBtn = document.getElementById('stay-btn');
        const terminal = document.getElementById('terminal-text');
        const audio = document.getElementById('bg-music');
        
        let prankStage = 0;
        const messages = [
            "> ERROR 403: Age progression is mandatory.",
            "> WARNING: Denial levels critical. Increasing cake requests.",
            "> LOG: Attempting to pause time... Access Denied.",
            "> System: Are you sure? Quarter-life crisis protocols will increase.",
            "> System: Confirming... Did you sign the waiver for adulting?"
        ];

        function evadeButton() {
            terminal.innerText = messages[prankStage];
            prankStage = (prankStage + 1) % messages.length;

            const container = document.getElementById('setup-window');
            const maxWidth = container.clientWidth - stayBtn.clientWidth - 30;
            const maxHeight = 240; 
            
            const randomX = Math.floor(Math.random() * maxWidth) + 15;
            const randomY = Math.floor(Math.random() * maxHeight) - 100; 

            stayBtn.style.left = randomX + 'px';
            stayBtn.style.top = randomY + 'px';
        }

        function triggerUpgrade() {
            document.getElementById('setup-window').style.display = 'none';
            const card = document.getElementById('celebration-card');
            card.style.display = 'block';
            
            setTimeout(() => {
                card.style.opacity = '1';
                card.style.transform = 'scale(1) translateY(0)';
            }, 50);

            audio.play().catch(error => {
                console.log("Audio play deferred.");
            });
            
            setInterval(createConfetti, 100);
            startLyricEngine();
        }

        const lyricsTimeline = [
            { time: 0.0, text: "🎵 Upgrading Nireeksha_OS... 🎵" },
            { time: 1.6, text: "So won't you say you love me?" },
            { time: 5.0, text: "I'll make you so proud of me" },
            { time: 8.5, text: "We'll make 'em turn their heads every place we go" },
            { time: 13.0, text: "So won't you, please..." },
            { time: 15.5, text: "Be my, be my baby! 🎵", highlight: true },
            { time: 18.8, text: "Be my little baby! 💖", highlight: true },
            { time: 21.0, text: "Say you'll be my darlin'! 💕", highlight: true },
            { time: 24.2, text: "Be my baby now! 🎉", highlight: true },
            { time: 26.5, text: "Whoa-oh-oh-oh ✨" }
        ];

        function startLyricEngine() {
            const display = document.getElementById('lyrics-display');
            
            audio.addEventListener('timeupdate', () => {
                const currentTime = audio.currentTime;
                let activeLine = lyricsTimeline[0].text;
                let shouldHighlight = false;

                for (let i = 0; i < lyricsTimeline.length; i++) {
                    if (currentTime >= lyricsTimeline[i].time) {
                        activeLine = lyricsTimeline[i].text;
                        shouldHighlight = lyricsTimeline[i].highlight || false;
                    }
                }

                display.innerText = activeLine;
                if (shouldHighlight) {
                    display.classList.add('lyrics-highlight');
                } else {
                    display.classList.remove('lyrics-highlight');
                }
            });
        }

        const colors = ['#ff3366', '#ff00aa', '#ffbd2e', '#00ff88', '#00d4ff'];
        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.width = Math.random() * 4 + 4 + 'px';
            confetti.style.height = (Math.random() * 12 + 8) + 'px'; // Sleek streamer rectangles
            confetti.style.animationDuration = Math.random() * 1.2 + 1.8 + 's';
            
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 3000);
        }
    </script>
</body>
</html>
